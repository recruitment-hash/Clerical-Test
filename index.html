<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clerical Speed & Accuracy Assessment – Corporate Recruitment</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS Client CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen selection:bg-blue-600 selection:text-white">

    <div id="app"></div>

    <script>
        // ==========================================
        // KONFIGURASI SUPABASE OTOMATIS
        // ==========================================
        const SUPABASE_URL = 'https://rgdfmtvvxhvtaeypawqz.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJnZGZtdHZ2eGh2dGFleXBhd3F6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2MTUzNzEsImV4cCI6MjEwMDE5MTM3MX0.9fzXG46ayNo-AKQIactHIaMZMEBV-fXukZHW_sseyBE';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const RECRUITER_PIN = "8899"; // PIN Akses Dashboard Rekruter

        let appState = {
            step: 'REGISTER', // REGISTER, TEST, RESULT, DASHBOARD
            candidate: null,
            questions: [],
            answers: {}, 
            timeLeft: 300,
            candidatesList: [],
            selectedDetailCandidate: null,
            detailSubmissions: []
        };

        const render = () => {
            const app = document.getElementById('app');
            app.innerHTML = '';

            if (appState.step === 'REGISTER') {
                app.appendChild(renderRegistration());
            } else if (appState.step === 'TEST') {
                app.appendChild(renderTestWorkspace());
            } else if (appState.step === 'RESULT') {
                app.appendChild(renderResultPage());
            } else if (appState.step === 'DASHBOARD') {
                app.appendChild(renderDashboard());
            }
        };

        // ==========================================
        // 1. HALAMAN REGISTRASI (KORPORAT PROFESIONAL)
        // ==========================================
        function renderRegistration() {
            const container = document.createElement('div');
            container.className = "min-h-screen flex items-center justify-center p-4 relative bg-gradient-to-br from-slate-100 via-white to-blue-50/50";
            
            container.innerHTML = `
                <div class="absolute top-6 right-6 z-20">
                    <button id="btn-goto-dashboard" class="group bg-white hover:bg-slate-50 text-slate-700 text-xs font-semibold px-4 py-2.5 rounded-lg border border-slate-200 shadow-sm transition-all duration-200 flex items-center gap-2">
                        <svg class="w-4 h-4 text-blue-600 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        Dashboard Rekruter (PIN)
                    </button>
                </div>

                <div class="bg-white rounded-2xl shadow-xl w-full max-w-xl p-8 sm:p-10 border border-slate-200/80 relative z-10">
                    <div class="border-b border-slate-100 pb-6 mb-6">
                        <div class="flex items-center gap-3 mb-3">
                            <div class="w-10 h-10 bg-blue-600 text-white rounded-lg flex items-center justify-center font-bold text-lg shadow-sm">
                                🏢
                            </div>
                            <div>
                                <span class="text-xs font-semibold tracking-wider text-blue-600 uppercase">Assessment Center</span>
                                <h1 class="text-xl sm:text-2xl font-bold text-slate-900">Clerical Assessment (Sama / Beda)</h1>
                            </div>
                        </div>
                        <p class="text-sm text-slate-600 leading-relaxed">
                            Uji kecepatan dan ketelitian visual data. Tentukan apakah <span class="text-slate-900 font-semibold">Kolom 1</span> dan <span class="text-slate-900 font-semibold">Kolom 2</span> bernilai <span class="text-emerald-700 font-bold">SAMA</span> atau <span class="text-amber-700 font-bold">BEDA</span>.
                        </p>
                    </div>

                    <!-- Informasi Panduan Tes -->
                    <div class="grid grid-cols-3 gap-3 mb-6 bg-slate-50 p-4 rounded-xl border border-slate-200 text-center">
                        <div>
                            <span class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wider">Durasi Tes</span>
                            <span class="text-sm font-bold text-slate-800">5 Menit</span>
                        </div>
                        <div class="border-x border-slate-200">
                            <span class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wider">Total Soal</span>
                            <span class="text-sm font-bold text-slate-800">74 Soal</span>
                        </div>
                        <div>
                            <span class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wider">Sistem Jawab</span>
                            <span class="text-sm font-bold text-blue-600">Pilih Tombol</span>
                        </div>
                    </div>
                    
                    <form id="reg-form" class="space-y-4">
                        <div>
                            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-600 mb-1.5">Nama Lengkap</label>
                            <input type="text" id="full_name" required class="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-lg text-slate-900 placeholder-slate-400 focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition text-sm" placeholder="Contoh: Budi Santoso" />
                        </div>
                        <div>
                            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-600 mb-1.5">Email Profesional / Aktif</label>
                            <input type="email" id="email" required class="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-lg text-slate-900 placeholder-slate-400 focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition text-sm" placeholder="budi@example.com" />
                        </div>
                        <div>
                            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-600 mb-1.5">Posisi yang Dilamar</label>
                            <input type="text" id="position" required class="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-lg text-slate-900 placeholder-slate-400 focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition text-sm" placeholder="Administrative & Data Entry Staff" />
                        </div>
                        
                        <button type="submit" id="btn-start" class="w-full mt-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition duration-200 shadow-md text-sm">
                            Mulai Tes Sekarang
                        </button>
                    </form>
                </div>
            `;

            container.querySelector('#btn-goto-dashboard').addEventListener('click', () => {
                const pinInput = prompt("Masukkan PIN Akses Rekruter:");
                if (pinInput === RECRUITER_PIN) {
                    appState.step = 'DASHBOARD';
                    fetchDashboardData();
                } else if (pinInput !== null) {
                    alert("PIN Akses Salah!");
                }
            });

            container.querySelector('#reg-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = container.querySelector('#btn-start');
                btn.disabled = true;
                btn.textContent = 'Menyiapkan Sesi Tes...';

                const payload = {
                    full_name: document.getElementById('full_name').value,
                    email: document.getElementById('email').value,
                    participant_id: 'CAND-' + Math.floor(1000 + Math.random() * 9000),
                    position: document.getElementById('position').value,
                    started_at: new Date().toISOString(),
                    status: 'IN_PROGRESS'
                };

                try {
                    const { data, error } = await supabaseClient
                        .from('candidates')
                        .insert([payload])
                        .select()
                        .single();

                    if (error) throw error;
                    appState.candidate = data;
                    appState.step = 'TEST';
                    initTestSession();
                } catch (err) {
                    alert('Gagal memulai sesi: ' + err.message);
                    btn.disabled = false;
                    btn.textContent = 'Mulai Tes Sekarang';
                }
            });

            return container;
        }

        // ==========================================
        // 2. LEMBAR KERJA TES
        // ==========================================
        let timerInterval = null;
        let isSubmittedGuard = false;

        async function initTestSession() {
            isSubmittedGuard = false;
            appState.timeLeft = 300;
            appState.answers = {};

            const { data, error } = await supabaseClient
                .from('clerical_questions')
                .select('*')
                .order('question_number', { ascending: true });

            if (error || !data || data.length === 0) {
                alert('Tabel "clerical_questions" kosong! Pastikan skrip SQL sudah dijalankan.');
                appState.step = 'REGISTER';
                render();
                return;
            }

            appState.questions = data;
            render();

            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                appState.timeLeft--;
                const timerEl = document.getElementById('timer-display');
                const headerEl = document.getElementById('test-header');
                
                if (timerEl) {
                    const mins = Math.floor(appState.timeLeft / 60).toString().padStart(2, '0');
                    const secs = (appState.timeLeft % 60).toString().padStart(2, '0');
                    timerEl.textContent = `${mins}:${secs}`;
                }

                if (appState.timeLeft < 60 && headerEl) {
                    headerEl.className = "sticky top-0 z-50 shadow-md px-6 py-4 flex justify-between items-center bg-red-700 text-white animate-pulse transition-colors";
                }

                if (appState.timeLeft <= 0) {
                    clearInterval(timerInterval);
                    triggerSubmit(true);
                }
            }, 1000);
        }

        function renderTestWorkspace() {
            const container = document.createElement('div');
            container.className = "min-h-screen flex flex-col bg-slate-100 text-slate-800";
            
            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
                const secs = (seconds % 60).toString().padStart(2, '0');
                return `${mins}:${secs}`;
            };

            container.innerHTML = `
                <header id="test-header" class="sticky top-0 z-50 shadow-md px-6 py-4 flex justify-between items-center transition-colors bg-white border-b border-slate-200 ${appState.timeLeft < 60 ? 'bg-red-700 text-white' : ''}">
                    <div>
                        <h2 class="font-bold text-base sm:text-lg">Clerical Assessment Test</h2>
                        <p class="text-xs text-slate-500">Peserta: <span class="text-slate-800 font-semibold">${appState.candidate.full_name}</span> (${appState.candidate.position})</p>
                    </div>
                    <div class="flex items-center space-x-6">
                        <div class="text-right">
                            <span class="text-[10px] uppercase tracking-wider block text-slate-500 font-semibold">Sisa Waktu</span>
                            <span id="timer-display" class="text-xl sm:text-2xl font-mono font-bold text-blue-600">${formatTime(appState.timeLeft)}</span>
                        </div>
                        <button id="btn-submit" class="bg-emerald-600 hover:bg-emerald-700 text-white font-semibold px-5 py-2 rounded-lg shadow transition text-sm">
                            Selesai & Kumpulkan
                        </button>
                    </div>
                </header>

                <main class="flex-1 max-w-7xl w-full mx-auto p-4 sm:p-6">
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="grid grid-cols-12 bg-slate-50 border-b border-slate-200 font-semibold text-xs text-slate-600 uppercase px-4 py-3 tracking-wider">
                            <div class="col-span-1 text-center">No</div>
                            <div class="col-span-2">Kategori</div>
                            <div class="col-span-3">Kolom 1 (Referensi)</div>
                            <div class="col-span-3">Kolom 2 (Pembanding)</div>
                            <div class="col-span-3 text-center">Pilihan Anda</div>
                        </div>
                        <div class="divide-y divide-slate-100 max-h-[70vh] overflow-y-auto" id="questions-container"></div>
                    </div>
                </main>
            `;

            const qContainer = container.querySelector('#questions-container');
            appState.questions.forEach((q, index) => {
                const row = document.createElement('div');
                row.className = "grid grid-cols-12 items-center px-4 py-3 hover:bg-slate-50 transition";
                const currentAnswer = appState.answers[q.id] || '';

                row.innerHTML = `
                    <div class="col-span-1 text-center font-mono text-sm text-slate-500">${index + 1}</div>
                    <div class="col-span-2 text-xs font-medium text-slate-700">${q.category}</div>
                    <div class="col-span-3 font-mono text-sm text-slate-800 bg-slate-50 p-2 rounded border border-slate-200 select-none overflow-x-auto">${q.reference_text}</div>
                    <div class="col-span-3 font-mono text-sm text-slate-800 bg-slate-50 p-2 rounded border border-slate-200 select-none overflow-x-auto">${q.expected_input_text}</div>
                    <div class="col-span-3 flex justify-center space-x-2">
                        <button type="button" data-qid="${q.id}" data-val="SAMA" class="choice-btn px-4 py-1.5 text-xs font-bold rounded border transition ${currentAnswer === 'SAMA' ? 'bg-blue-600 text-white border-blue-600 shadow-sm' : 'bg-white text-slate-700 border-slate-300 hover:bg-slate-100'}">SAMA</button>
                        <button type="button" data-qid="${q.id}" data-val="BEDA" class="choice-btn px-4 py-1.5 text-xs font-bold rounded border transition ${currentAnswer === 'BEDA' ? 'bg-amber-600 text-white border-amber-600 shadow-sm' : 'bg-white text-slate-700 border-slate-300 hover:bg-slate-100'}">BEDA</button>
                    </div>
                `;
                qContainer.appendChild(row);
            });

            container.querySelectorAll('.choice-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const qId = e.target.getAttribute('data-qid');
                    const val = e.target.getAttribute('data-val');
                    appState.answers[qId] = val;

                    const parentDiv = e.target.parentElement;
                    parentDiv.querySelectorAll('.choice-btn').forEach(b => {
                        b.className = "choice-btn px-4 py-1.5 text-xs font-bold rounded border transition bg-white text-slate-700 border-slate-300 hover:bg-slate-100";
                    });
                    if (val === 'SAMA') {
                        e.target.className = "choice-btn px-4 py-1.5 text-xs font-bold rounded border transition bg-blue-600 text-white border-blue-600 shadow-sm";
                    } else {
                        e.target.className = "choice-btn px-4 py-1.5 text-xs font-bold rounded border transition bg-amber-600 text-white border-amber-600 shadow-sm";
                    }
                });
            });

            container.querySelector('#btn-submit').addEventListener('click', () => {
                if (confirm('Apakah Anda yakin ingin menyelesaikan dan mengumpulkan lembar tes sekarang?')) {
                    if (timerInterval) clearInterval(timerInterval);
                    triggerSubmit(false);
                }
            });

            return container;
        }

        async function triggerSubmit(isTimeout) {
            if (isSubmittedGuard) return;
            isSubmittedGuard = true;
            if (timerInterval) clearInterval(timerInterval);

            const endTime = new Date();
            const startTime = new Date(appState.candidate.started_at);
            const totalSeconds = Math.min(300, Math.floor((endTime - startTime) / 1000));

            let correctCount = 0;
            const submissionPayloads = appState.questions.map((q) => {
                const isActuallySame = q.reference_text.trim() === q.expected_input_text.trim();
                const correctChoice = isActuallySame ? 'SAMA' : 'BEDA';
                const candidateChoice = appState.answers[q.id] || 'TIDAK DIJAWAB';
                
                const isCorrect = candidateChoice === correctChoice;
                if (isCorrect) correctCount++;

                return {
                    candidate_id: appState.candidate.id,
                    question_id: q.id,
                    submitted_value: candidateChoice,
                    is_correct: isCorrect
                };
            });

            const accuracyScore = Number(((correctCount / appState.questions.length) * 100).toFixed(2));

            try {
                await supabaseClient.from('clerical_submissions').insert(submissionPayloads);
                const { data, error } = await supabaseClient
                    .from('candidates')
                    .update({
                        submitted_at: endTime.toISOString(),
                        total_time_seconds: totalSeconds,
                        accuracy_score: accuracyScore,
                        status: isTimeout ? 'TIMED_OUT' : 'COMPLETED'
                    })
                    .eq('id', appState.candidate.id)
                    .select()
                    .single();

                if (error) throw error;
                appState.candidate = data;
                appState.step = 'RESULT';
                render();
            } catch (err) {
                alert('Gagal mengirim hasil: ' + err.message);
                isSubmittedGuard = false;
            }
        }

        // ==========================================
        // 3. HALAMAN HASIL / RESULT PAGE (KANDIDAT TIDAK BISA LIHAT SKOR)
        // ==========================================
        function renderResultPage() {
            const container = document.createElement('div');
            container.className = "min-h-screen flex items-center justify-center p-4 bg-slate-100";

            container.innerHTML = `
                <div class="bg-white border border-slate-200 rounded-2xl shadow-xl w-full max-w-md p-8 text-center">
                    <div class="w-16 h-16 mx-auto flex items-center justify-center rounded-2xl bg-emerald-50 border border-emerald-200 text-emerald-600 text-2xl mb-4 font-bold">
                        ✓
                    </div>
                    
                    <h1 class="text-2xl font-bold text-slate-900 mb-2">Tes Selesai Diserahkan</h1>
                    <p class="text-sm text-slate-600 mb-6 leading-relaxed">
                        Terima kasih, <span class="text-slate-800 font-semibold">${appState.candidate.full_name}</span>. Jawaban Anda telah terekam secara otomatis oleh sistem rekrutmen.
                    </p>

                    <div class="bg-slate-50 rounded-xl p-4 text-left space-y-2 mb-6 border border-slate-200 text-xs text-slate-700">
                        <div class="flex justify-between"><span class="text-slate-500">ID Sesi:</span> <span class="font-mono text-slate-800">${appState.candidate.participant_id}</span></div>
                        <div class="flex justify-between"><span class="text-slate-500">Posisi:</span> <span class="font-semibold text-slate-800">${appState.candidate.position}</span></div>
                        <div class="flex justify-between"><span class="text-slate-500">Waktu Pengerjaan:</span> <span class="font-mono text-slate-800">${appState.candidate.total_time_seconds} Detik</span></div>
                        <div class="flex justify-between"><span class="text-slate-500">Status:</span> <span class="text-emerald-600 font-bold">Terkirim</span></div>
                    </div>

                    <div class="p-3 bg-blue-50 border border-blue-100 rounded-xl text-xs text-blue-900 mb-6 text-center">
                        Hasil detail dan evaluasi tes ini dikelola dan ditinjau secara eksklusif oleh tim rekruter korporat.
                    </div>

                    <button id="btn-finish-session" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-medium py-3 rounded-lg transition duration-200 shadow text-sm">
                        Keluar / Selesai
                    </button>
                </div>
            `;

            container.querySelector('#btn-finish-session').addEventListener('click', () => {
                window.location.reload();
            });

            return container;
        }

        // ==========================================
        // 4. DASHBOARD REKRUTER & ADMIN (DENGAN INTERPRETASI LENGKAP)
        // ==========================================
        async function fetchDashboardData() {
            const { data, error } = await supabaseClient
                .from('candidates')
                .select('*')
                .order('started_at', { ascending: false });

            if (!error) {
                appState.candidatesList = data || [];
                render();
            } else {
                alert('Gagal mengambil data kandidat: ' + error.message);
            }
        }

        function renderDashboard() {
            const container = document.createElement('div');
            container.className = "min-h-screen bg-slate-100 text-slate-900 flex flex-col";

            container.innerHTML = `
                <header class="bg-white border-b border-slate-200 px-8 py-4 shadow-sm flex justify-between items-center">
                    <div>
                        <h1 class="text-lg font-bold text-slate-900 flex items-center gap-2">
                            <span class="w-3 h-3 bg-emerald-500 rounded-full inline-block"></span>
                            Dashboard Rekruter & Admin Korporat
                        </h1>
                        <p class="text-xs text-slate-500">Panel Evaluasi & Interpretasi Hasil Tes Kandidat</p>
                    </div>
                    <button id="btn-back-reg" class="bg-white hover:bg-slate-50 text-slate-700 text-xs font-semibold px-4 py-2 rounded-lg border border-slate-300 transition">
                        &larr; Keluar ke Halaman Utama
                    </button>
                </header>

                <main class="flex-1 max-w-7xl w-full mx-auto p-6">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                        <div class="bg-white border border-slate-200 p-6 rounded-xl shadow-sm">
                            <h3 class="text-xs uppercase font-semibold text-slate-500 mb-1">Total Kandidat Masuk</h3>
                            <p class="text-3xl font-extrabold text-slate-900">${appState.candidatesList.length}</p>
                        </div>
                        <div class="bg-white border border-slate-200 p-6 rounded-xl shadow-sm">
                            <h3 class="text-xs uppercase font-semibold text-slate-500 mb-1">Tes Selesai</h3>
                            <p class="text-3xl font-extrabold text-emerald-600">${appState.candidatesList.filter(c => c.status === 'COMPLETED' || c.status === 'TIMED_OUT').length}</p>
                        </div>
                        <div class="bg-white border border-slate-200 p-6 rounded-xl shadow-sm">
                            <h3 class="text-xs uppercase font-semibold text-slate-500 mb-1">Rata-rata Akurasi Global</h3>
                            <p class="text-3xl font-extrabold text-blue-600">
                                ${appState.candidatesList.length ? (appState.candidatesList.reduce((acc, c) => acc + Number(c.accuracy_score || 0), 0) / appState.candidatesList.length).toFixed(1) : 0}%
                            </p>
                        </div>
                    </div>

                    <div class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
                        <div class="px-6 py-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                            <h2 class="font-bold text-slate-900 text-base">Daftar Hasil & Interpretasi Rekrutmen Kandidat</h2>
                            <button id="btn-refresh-dash" class="text-xs bg-white hover:bg-slate-100 text-slate-700 px-3.5 py-2 rounded-lg font-medium transition border border-slate-300">Refresh Data</button>
                        </div>
                        
                        <div class="overflow-x-auto">
                            <table class="w-full text-left border-collapse">
                                <thead>
                                    <tr class="bg-slate-100/70 border-b border-slate-200 text-xs font-semibold text-slate-600 uppercase tracking-wider">
                                        <th class="px-6 py-3.5">Kandidat</th>
                                        <th class="px-6 py-3.5">ID Sesi</th>
                                        <th class="px-6 py-3.5">Posisi Dilamar</th>
                                        <th class="px-6 py-3.5">Durasi</th>
                                        <th class="px-6 py-3.5">Akurasi</th>
                                        <th class="px-6 py-3.5">Tingkat Ketelitian & Rekomendasi</th>
                                        <th class="px-6 py-3.5 text-center">Aksi</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-100 text-sm">
                                    ${appState.candidatesList.length === 0 ? `
                                        <tr><td colspan="7" class="text-center py-10 text-slate-400">Belum ada data kandidat tercatat.</td></tr>
                                    ` : appState.candidatesList.map(c => {
                                        const score = Number(c.accuracy_score || 0);
                                        let tier = "Rendah (Poor)";
                                        let interpText = "Kurang memiliki ketelitian visual dan mudah terkecoh pada perbedaan karakter kecil. Tidak direkomendasikan untuk posisi yang menuntut akurasi data yang tinggi.";
                                        let badgeColor = "bg-red-50 text-red-700 border-red-200";

                                        if (score >= 90) {
                                            tier = "Sangat Tinggi (Excellent)";
                                            interpText = "Kandidat memiliki konsentrasi, ketelitian visual, dan mata jeli yang luar biasa terhadap detail kecil (angka/huruf). Sangat direkomendasikan untuk posisi administratif tingkat lanjut, Data Entry, Keuangan/Akuntansi, atau Auditor.";
                                            badgeColor = "bg-emerald-50 text-emerald-700 border-emerald-200";
                                        } else if (score >= 80) {
                                            tier = "Tinggi (Good)";
                                            interpText = "Kandidat cukup teliti dan mampu bekerja di bawah tekanan waktu dengan baik, meski ada sedikit kesalahan minor. Direkomendasikan untuk posisi operasional, Customer Service, atau staf umum.";
                                            badgeColor = "bg-blue-50 text-blue-700 border-blue-200";
                                        } else if (score >= 70) {
                                            tier = "Sedang (Moderate)";
                                            interpText = "Tingkat ketelitian kurang konsisten. Kandidat berisiko tinggi melakukan kesalahan input data jika bekerja dalam volume besar atau tempo cepat. Perlu pelatihan tambahan jika diterima.";
                                            badgeColor = "bg-amber-50 text-amber-700 border-amber-200";
                                        }

                                        return `
                                            <tr class="hover:bg-slate-50/80 transition align-top">
                                                <td class="px-6 py-4 font-semibold text-slate-900">${c.full_name}<br><span class="text-xs font-normal text-slate-500">${c.email}</span></td>
                                                <td class="px-6 py-4 font-mono text-xs text-slate-600">${c.participant_id}</td>
                                                <td class="px-6 py-4 text-slate-700">${c.position}</td>
                                                <td class="px-6 py-4 font-mono text-slate-700">${c.total_time_seconds}s</td>
                                                <td class="px-6 py-4 font-bold text-slate-900">${score}%</td>
                                                <td class="px-6 py-4 max-w-xs">
                                                    <div class="inline-block px-2.5 py-0.5 rounded text-xs font-bold border mb-1 ${badgeColor}">${tier}</div>
                                                    <p class="text-xs text-slate-600 leading-relaxed">${interpText}</p>
                                                </td>
                                                <td class="px-6 py-4 text-center">
                                                    <button data-id="${c.id}" class="btn-detail bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 font-semibold px-3 py-1.5 rounded-lg text-xs transition">
                                                        Detail Jawaban
                                                    </button>
                                                </td>
                                            </tr>
                                        `;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </main>
            `;

            container.querySelector('#btn-back-reg').addEventListener('click', () => {
                appState.step = 'REGISTER';
                render();
            });

            container.querySelector('#btn-refresh-dash').addEventListener('click', fetchDashboardData);

            container.querySelectorAll('.btn-detail').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const candidateId = e.target.getAttribute('data-id');
                    appState.selectedDetailCandidate = appState.candidatesList.find(item => item.id === candidateId);

                    const { data } = await supabaseClient
                        .from('clerical_submissions')
                        .select('*, clerical_questions(*)')
                        .eq('candidate_id', candidateId);

                    appState.detailSubmissions = data || [];
                    renderDetailModal();
                });
            });

            return container;
        }

        function renderDetailModal() {
            const existingModal = document.getElementById('detail-modal');
            if (existingModal) existingModal.remove();

            const modal = document.createElement('div');
            modal.id = 'detail-modal';
            modal.className = "fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 backdrop-blur-sm p-4";
            
            modal.innerHTML = `
                <div class="bg-white border border-slate-200 rounded-2xl shadow-2xl w-full max-w-4xl max-h-[85vh] flex flex-col overflow-hidden">
                    <div class="px-6 py-4 bg-slate-900 text-white flex justify-between items-center">
                        <div>
                            <h3 class="font-bold text-white text-base">Evaluasi Detail: ${appState.selectedDetailCandidate.full_name}</h3>
                            <p class="text-xs text-slate-300">Posisi: ${appState.selectedDetailCandidate.position} | Akurasi Total: <span class="text-blue-300 font-bold">${appState.selectedDetailCandidate.accuracy_score}%</span></p>
                        </div>
                        <button id="close-modal" class="text-slate-300 hover:text-white font-bold text-xl">&times;</button>
                    </div>
                    
                    <div class="p-6 overflow-y-auto flex-1">
                        <table class="w-full text-left border-collapse text-xs">
                            <thead>
                                <tr class="bg-slate-100 border-b border-slate-200 font-semibold text-slate-700 uppercase tracking-wider">
                                    <th class="p-3">Kategori</th>
                                    <th class="p-3">Kolom 1</th>
                                    <th class="p-3">Kolom 2</th>
                                    <th class="p-3">Pilihan Kandidat</th>
                                    <th class="p-3 text-center">Status</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100 font-mono">
                                ${appState.detailSubmissions.map(sub => `
                                    <tr class="${sub.is_correct ? 'bg-emerald-50/50' : 'bg-red-50/50'}">
                                        <td class="p-3 font-sans font-medium text-slate-700">${sub.clerical_questions?.category || '-'}</td>
                                        <td class="p-3 text-slate-800">${sub.clerical_questions?.reference_text || '-'}</td>
                                        <td class="p-3 text-slate-800">${sub.clerical_questions?.expected_input_text || '-'}</td>
                                        <td class="p-3 font-bold text-slate-900">${sub.submitted_value || '-'}</td>
                                        <td class="p-3 text-center">
                                            <span class="px-2.5 py-0.5 rounded text-[10px] font-sans font-bold border ${sub.is_correct ? 'bg-emerald-100 text-emerald-800 border-emerald-300' : 'bg-red-100 text-red-800 border-red-300'}">
                                                ${sub.is_correct ? 'BENAR' : 'SALAH'}
                                            </span>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>

                    <div class="px-6 py-4 bg-slate-50 border-t border-slate-200 text-right">
                        <button id="btn-close-modal-bottom" class="bg-slate-800 hover:bg-slate-900 text-white font-medium px-5 py-2 rounded-lg text-xs transition border border-slate-700">Tutup Panel</button>
                    </div>
                </div>
            `;

            document.body.appendChild(modal);

            modal.querySelector('#close-modal').addEventListener('click', () => modal.remove());
            modal.querySelector('#btn-close-modal-bottom').addEventListener('click', () => modal.remove());
        }

        window.addEventListener('DOMContentLoaded', render);
    </script>
</body>
</html>
