<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clerical Test (Sama/Beda) – Admin & Recruiter Dashboard</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS Client CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen">

    <div id="app"></div>

    <script>
        // ==========================================
        // KONFIGURASI SUPABASE OTOMATIS
        // ==========================================
        const SUPABASE_URL = 'https://rgdfmtvvxhvtaeypawqz.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJnZGZtdHZ2eGh2dGFleXBhd3F6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2MTUzNzEsImV4cCI6MjEwMDE5MTM3MX0.9fzXG46ayNo-AKQIactHIaMZMEBV-fXukZHW_sseyBE';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let appState = {
            step: 'REGISTER', // REGISTER, TEST, RESULT, DASHBOARD
            candidate: null,
            questions: [],
            answers: {}, // Menyimpan 'SAMA' atau 'BEDA' per question_id
            timeLeft: 300,
            candidatesList: [],
            selectedDetailCandidate: null,
            detailSubmissions: []
        };

        const render = () => {
            const app = document.getElementById('app');
            app.innerHTML = '';

            if (appState.step === 'REGISTER') {
                app.appendChild(renderRegistration());
            } else if (appState.step === 'TEST') {
                app.appendChild(renderTestWorkspace());
            } else if (appState.step === 'RESULT') {
                app.appendChild(renderResultPage());
            } else if (appState.step === 'DASHBOARD') {
                app.appendChild(renderDashboard());
            }
        };

        // ==========================================
        // 1. HALAMAN REGISTRASI
        // ==========================================
        function renderRegistration() {
            const container = document.createElement('div');
            container.className = "min-h-screen flex items-center justify-center p-4 relative";
            container.innerHTML = `
                <button id="btn-goto-dashboard" class="absolute top-6 right-6 bg-slate-800 hover:bg-slate-900 text-white text-xs font-semibold px-4 py-2 rounded-lg shadow transition flex items-center gap-2">
                    Dashboard Rekruter
                </button>

                <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg p-8 border border-slate-200">
                    <h1 class="text-2xl font-bold text-slate-800 mb-2">Clerical Assessment (Sama / Beda)</h1>
                    <p class="text-sm text-slate-500 mb-6">Tentukan apakah Kolom 1 dan Kolom 2 bernilai Sama atau Beda (Waktu: 5 Menit / 300 Detik).</p>
                    
                    <form id="reg-form" class="space-y-4">
                        <div>
                            <label class="block text-xs font-semibold uppercase text-slate-600 mb-1">Nama Lengkap</label>
                            <input type="text" id="full_name" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Contoh: Budi Santoso" />
                        </div>
                        <div>
                            <label class="block text-xs font-semibold uppercase text-slate-600 mb-1">Email</label>
                            <input type="email" id="email" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="budi@example.com" />
                        </div>
                        <div>
                            <label class="block text-xs font-semibold uppercase text-slate-600 mb-1">Nomor Peserta / NIK</label>
                            <input type="text" id="participant_id" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="PST-001" />
                        </div>
                        <div>
                            <label class="block text-xs font-semibold uppercase text-slate-600 mb-1">Posisi yang Dilamar</label>
                            <input type="text" id="position" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Administrative Staff" />
                        </div>
                        <button type="submit" id="btn-start" class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-lg transition duration-200 shadow-md">
                            Mulai Tes Sekarang
                        </button>
                    </form>
                </div>
            `;

            container.querySelector('#btn-goto-dashboard').addEventListener('click', () => {
                appState.step = 'DASHBOARD';
                fetchDashboardData();
            });

            container.querySelector('#reg-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = container.querySelector('#btn-start');
                btn.disabled = true;
                btn.textContent = 'Menyiapkan Sesi...';

                const payload = {
                    full_name: document.getElementById('full_name').value,
                    email: document.getElementById('email').value,
                    participant_id: document.getElementById('participant_id').value,
                    position: document.getElementById('position').value,
                    started_at: new Date().toISOString(),
                    status: 'IN_PROGRESS'
                };

                try {
                    const { data, error } = await supabaseClient
                        .from('candidates')
                        .insert([payload])
                        .select()
                        .single();

                    if (error) throw error;
                    appState.candidate = data;
                    appState.step = 'TEST';
                    initTestSession();
                } catch (err) {
                    alert('Gagal memulai sesi: ' + err.message);
                    btn.disabled = false;
                    btn.textContent = 'Mulai Tes Sekarang';
                }
            });

            return container;
        }

        // ==========================================
        // 2. LEMBAR KERJA TES (PILIH SAMA / BEDA)
        // ==========================================
        let timerInterval = null;
        let isSubmittedGuard = false;

        async function initTestSession() {
            isSubmittedGuard = false;
            appState.timeLeft = 300;
            appState.answers = {};

            const { data, error } = await supabaseClient
                .from('clerical_questions')
                .select('*')
                .order('question_number', { ascending: true });

            if (error || !data || data.length === 0) {
                alert('Tabel "clerical_questions" kosong! Pastikan sudah menjalankan skrip SQL.');
                appState.step = 'REGISTER';
                render();
                return;
            }

            appState.questions = data;
            render();

            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                appState.timeLeft--;
                const timerEl = document.getElementById('timer-display');
                const headerEl = document.getElementById('test-header');
                
                if (timerEl) {
                    const mins = Math.floor(appState.timeLeft / 60).toString().padStart(2, '0');
                    const secs = (appState.timeLeft % 60).toString().padStart(2, '0');
                    timerEl.textContent = `${mins}:${secs}`;
                }

                if (appState.timeLeft < 60 && headerEl) {
                    headerEl.className = "sticky top-0 z-50 shadow-md px-6 py-4 flex justify-between items-center bg-red-600 text-white animate-pulse transition-colors duration-300";
                }

                if (appState.timeLeft <= 0) {
                    clearInterval(timerInterval);
                    triggerSubmit(true);
                }
            }, 1000);
        }

        function renderTestWorkspace() {
            const container = document.createElement('div');
            container.className = "min-h-screen flex flex-col bg-slate-50";
            
            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
                const secs = (seconds % 60).toString().padStart(2, '0');
                return `${mins}:${secs}`;
            };

            container.innerHTML = `
                <header id="test-header" class="sticky top-0 z-50 shadow-md px-6 py-4 flex justify-between items-center transition-colors duration-300 ${appState.timeLeft < 60 ? 'bg-red-600 text-white animate-pulse' : 'bg-slate-900 text-white'}">
                    <div>
                        <h2 class="font-bold text-lg">Clerical Test (Sama / Beda)</h2>
                        <p class="text-xs opacity-80">Peserta: ${appState.candidate.full_name} (${appState.candidate.participant_id})</p>
                    </div>
                    <div class="flex items-center space-x-6">
                        <div class="text-right">
                            <span class="text-xs uppercase tracking-wider block opacity-75">Sisa Waktu</span>
                            <span id="timer-display" class="text-2xl font-mono font-bold">${formatTime(appState.timeLeft)}</span>
                        </div>
                        <button id="btn-submit" class="bg-emerald-500 hover:bg-emerald-600 text-white font-semibold px-5 py-2 rounded-lg shadow transition">
                            Selesai / Submit
                        </button>
                    </div>
                </header>

                <main class="flex-1 max-w-7xl w-full mx-auto p-4 sm:p-6">
                    <div class="bg-white rounded-xl shadow border border-slate-200 overflow-hidden">
                        <div class="grid grid-cols-12 bg-slate-100 border-b border-slate-200 font-semibold text-xs text-slate-600 uppercase px-4 py-3">
                            <div class="col-span-1 text-center">No</div>
                            <div class="col-span-2">Kategori</div>
                            <div class="col-span-3">Kolom 1 (Referensi)</div>
                            <div class="col-span-3">Kolom 2 (Pembanding)</div>
                            <div class="col-span-3 text-center">Pilihan Anda</div>
                        </div>
                        <div class="divide-y divide-slate-100 max-h-[70vh] overflow-y-auto" id="questions-container"></div>
                    </div>
                </main>
            `;

            const qContainer = container.querySelector('#questions-container');
            appState.questions.forEach((q, index) => {
                const row = document.createElement('div');
                row.className = "grid grid-cols-12 items-center px-4 py-3 hover:bg-slate-50 transition";
                const currentAnswer = appState.answers[q.id] || '';

                row.innerHTML = `
                    <div class="col-span-1 text-center font-mono text-sm text-slate-500">${index + 1}</div>
                    <div class="col-span-2 text-xs font-medium text-slate-700">${q.category}</div>
                    <div class="col-span-3 font-mono text-sm text-slate-800 bg-slate-100 p-1.5 rounded border border-slate-200 select-none overflow-x-auto">${q.reference_text}</div>
                    <div class="col-span-3 font-mono text-sm text-slate-800 bg-slate-100 p-1.5 rounded border border-slate-200 select-none overflow-x-auto">${q.expected_input_text}</div>
                    <div class="col-span-3 flex justify-center space-x-2">
                        <button type="button" data-qid="${q.id}" data-val="SAMA" class="choice-btn px-4 py-1.5 text-xs font-bold rounded border transition ${currentAnswer === 'SAMA' ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-700 border-slate-300 hover:bg-slate-100'}">SAMA</button>
                        <button type="button" data-qid="${q.id}" data-val="BEDA" class="choice-btn px-4 py-1.5 text-xs font-bold rounded border transition ${currentAnswer === 'BEDA' ? 'bg-amber-600 text-white border-amber-600' : 'bg-white text-slate-700 border-slate-300 hover:bg-slate-100'}">BEDA</button>
                    </div>
                `;
                qContainer.appendChild(row);
            });

            container.querySelectorAll('.choice-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const qId = e.target.getAttribute('data-qid');
                    const val = e.target.getAttribute('data-val');
                    appState.answers[qId] = val;

                    // Update UI button active state secara instan
                    const parentDiv = e.target.parentElement;
                    parentDiv.querySelectorAll('.choice-btn').forEach(b => {
                        b.className = "choice-btn px-4 py-1.5 text-xs font-bold rounded border transition bg-white text-slate-700 border-slate-300 hover:bg-slate-100";
                    });
                    if (val === 'SAMA') {
                        e.target.className = "choice-btn px-4 py-1.5 text-xs font-bold rounded border transition bg-blue-600 text-white border-blue-600";
                    } else {
                        e.target.className = "choice-btn px-4 py-1.5 text-xs font-bold rounded border transition bg-amber-600 text-white border-amber-600";
                    }
                });
            });

            container.querySelector('#btn-submit').addEventListener('click', () => {
                if (confirm('Apakah Anda yakin ingin mengumpulkan lembar kerja sekarang?')) {
                    if (timerInterval) clearInterval(timerInterval);
                    triggerSubmit(false);
                }
            });

            return container;
        }

        async function triggerSubmit(isTimeout) {
            if (isSubmittedGuard) return;
            isSubmittedGuard = true;
            if (timerInterval) clearInterval(timerInterval);

            const endTime = new Date();
            const startTime = new Date(appState.candidate.started_at);
            const totalSeconds = Math.min(300, Math.floor((endTime - startTime) / 1000));

            let correctCount = 0;
            const submissionPayloads = appState.questions.map((q) => {
                const isActuallySame = q.reference_text.trim() === q.expected_input_text.trim();
                const correctChoice = isActuallySame ? 'SAMA' : 'BEDA';
                const candidateChoice = appState.answers[q.id] || 'TIDAK DIJAWAB';
                
                const isCorrect = candidateChoice === correctChoice;
                if (isCorrect) correctCount++;

                return {
                    candidate_id: appState.candidate.id,
                    question_id: q.id,
                    submitted_value: candidateChoice,
                    is_correct: isCorrect
                };
            });

            const accuracyScore = Number(((correctCount / appState.questions.length) * 100).toFixed(2));

            try {
                await supabaseClient.from('clerical_submissions').insert(submissionPayloads);
                const { data, error } = await supabaseClient
                    .from('candidates')
                    .update({
                        submitted_at: endTime.toISOString(),
                        total_time_seconds: totalSeconds,
                        accuracy_score: accuracyScore,
                        status: isTimeout ? 'TIMED_OUT' : 'COMPLETED'
                    })
                    .eq('id', appState.candidate.id)
                    .select()
                    .single();

                if (error) throw error;
                appState.candidate = data;
                appState.step = 'RESULT';
                render();
            } catch (err) {
                alert('Gagal mengirim hasil: ' + err.message);
                isSubmittedGuard = false;
            }
        }

        // ==========================================
        // 3. HALAMAN HASIL / RESULT PAGE
        // ==========================================
        function renderResultPage() {
            const container = document.createElement('div');
            container.className = "min-h-screen flex items-center justify-center p-4 bg-slate-100";
            const score = appState.candidate.accuracy_score;
            
            let interpretation = "Rendah (Poor) - Tidak direkomendasikan untuk posisi ketelitian data.";
            if (score >= 90) interpretation = "Sangat Tinggi (Excellent) - Sangat teliti, cocok untuk posisi Administrasi/Keuangan.";
            else if (score >= 80) interpretation = "Tinggi (Good) - Cukup teliti dan handal.";
            else if (score >= 70) interpretation = "Sedang (Moderate) - Ketelitian kurang konsisten.";

            container.innerHTML = `
                <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8 border border-slate-200 text-center">
                    <div class="w-16 h-16 mx-auto flex items-center justify-center rounded-full mb-4 text-white text-2xl font-bold ${score >= 80 ? 'bg-emerald-500' : 'bg-amber-500'}">
                        ${score >= 80 ? '✓' : '!'}
                    </div>
                    
                    <h1 class="text-2xl font-bold text-slate-800 mb-1">Tes Selesai</h1>
                    <p class="text-sm text-slate-500 mb-6">Evaluasi kecepatan & ketelitian Anda telah diproses.</p>

                    <div class="bg-slate-50 rounded-xl p-4 text-left space-y-2 mb-4 border border-slate-200 text-sm">
                        <div class="flex justify-between"><span class="text-slate-500">Nama:</span> <span class="font-semibold text-slate-800">${appState.candidate.full_name}</span></div>
                        <div class="flex justify-between"><span class="text-slate-500">ID Peserta:</span> <span class="font-semibold text-slate-800">${appState.candidate.participant_id}</span></div>
                        <div class="flex justify-between"><span class="text-slate-500">Waktu Pengerjaan:</span> <span class="font-semibold text-slate-800">${appState.candidate.total_time_seconds} Detik</span></div>
                        <div class="flex justify-between"><span class="text-slate-500">Skor Akurasi:</span> <span class="font-bold text-blue-600">${score}%</span></div>
                    </div>

                    <div class="bg-blue-50 border border-blue-200 rounded-xl p-3 text-left mb-6 text-xs text-blue-900">
                        <strong class="block mb-1 font-semibold">Interpretasi Kinerja:</strong>
                        ${interpretation}
                    </div>

                    <div class="space-y-2">
                        <button id="btn-view-detail" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition duration-200 shadow text-sm">
                            Lihat Rincian Jawaban Saya
                        </button>
                        <button id="btn-restart" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-medium py-2.5 rounded-lg transition duration-200 shadow text-sm">
                            Keluar / Sesi Baru
                        </button>
                    </div>
                </div>
            `;

            container.querySelector('#btn-view-detail').addEventListener('click', async () => {
                const { data } = await supabaseClient
                    .from('clerical_submissions')
                    .select('*, clerical_questions(*)')
                    .eq('candidate_id', appState.candidate.id);
                
                appState.detailSubmissions = data || [];
                appState.selectedDetailCandidate = appState.candidate;
                renderDetailModal();
            });

            container.querySelector('#btn-restart').addEventListener('click', () => {
                window.location.reload();
            });

            return container;
        }

        // ==========================================
        // 4. DASHBOARD REKRUTER & ADMIN
        // ==========================================
        async function fetchDashboardData() {
            const { data, error } = await supabaseClient
                .from('candidates')
                .select('*')
                .order('started_at', { ascending: false });

            if (!error) {
                appState.candidatesList = data || [];
                render();
            } else {
                alert('Gagal mengambil data kandidat: ' + error.message);
            }
        }

        function renderDashboard() {
            const container = document.createElement('div');
            container.className = "min-h-screen bg-slate-100 flex flex-col";

            container.innerHTML = `
                <header class="bg-slate-900 text-white px-8 py-4 shadow flex justify-between items-center">
                    <div>
                        <h1 class="text-xl font-bold">Dashboard Rekruter & Admin</h1>
                        <p class="text-xs text-slate-400">Hasil Tes Perbandingan Sama / Beda Kandidat</p>
                    </div>
                    <button id="btn-back-reg" class="bg-slate-700 hover:bg-slate-800 text-xs font-semibold px-4 py-2 rounded-lg transition">
                        &larr; Kembali ke Halaman Utama Tes
                    </button>
                </header>

                <main class="flex-1 max-w-7xl w-full mx-auto p-6">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                        <div class="bg-white p-6 rounded-xl shadow border border-slate-200">
                            <h3 class="text-xs uppercase font-semibold text-slate-500 mb-1">Total Kandidat</h3>
                            <p class="text-3xl font-bold text-slate-800">${appState.candidatesList.length}</p>
                        </div>
                        <div class="bg-white p-6 rounded-xl shadow border border-slate-200">
                            <h3 class="text-xs uppercase font-semibold text-slate-500 mb-1">Selesai (Completed)</h3>
                            <p class="text-3xl font-bold text-emerald-600">${appState.candidatesList.filter(c => c.status === 'COMPLETED' || c.status === 'TIMED_OUT').length}</p>
                        </div>
                        <div class="bg-white p-6 rounded-xl shadow border border-slate-200">
                            <h3 class="text-xs uppercase font-semibold text-slate-500 mb-1">Rata-rata Akurasi</h3>
                            <p class="text-3xl font-bold text-blue-600">
                                ${appState.candidatesList.length ? (appState.candidatesList.reduce((acc, c) => acc + Number(c.accuracy_score || 0), 0) / appState.candidatesList.length).toFixed(1) : 0}%
                            </p>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl shadow border border-slate-200 overflow-hidden">
                        <div class="px-6 py-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                            <h2 class="font-bold text-slate-800 text-base">Daftar Hasil Tes Kandidat</h2>
                            <button id="btn-refresh-dash" class="text-xs bg-slate-200 hover:bg-slate-300 px-3 py-1.5 rounded font-medium transition">Refresh Data</button>
                        </div>
                        
                        <div class="overflow-x-auto">
                            <table class="w-full text-left border-collapse">
                                <thead>
                                    <tr class="bg-slate-100 border-b border-slate-200 text-xs font-semibold text-slate-600 uppercase">
                                        <th class="px-6 py-3">Nama Kandidat</th>
                                        <th class="px-6 py-3">ID Peserta</th>
                                        <th class="px-6 py-3">Posisi</th>
                                        <th class="px-6 py-3">Waktu (Detik)</th>
                                        <th class="px-6 py-3">Akurasi</th>
                                        <th class="px-6 py-3">Status</th>
                                        <th class="px-6 py-3 text-center">Aksi</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-100 text-sm">
                                    ${appState.candidatesList.length === 0 ? `
                                        <tr><td colspan="7" class="text-center py-8 text-slate-400">Belum ada data kandidat tercatat.</td></tr>
                                    ` : appState.candidatesList.map(c => `
                                        <tr class="hover:bg-slate-50">
                                            <td class="px-6 py-4 font-medium text-slate-800">${c.full_name}<br><span class="text-xs font-normal text-slate-400">${c.email}</span></td>
                                            <td class="px-6 py-4 font-mono text-xs">${c.participant_id}</td>
                                            <td class="px-6 py-4 text-slate-600">${c.position}</td>
                                            <td class="px-6 py-4 font-mono">${c.total_time_seconds}s</td>
                                            <td class="px-6 py-4 font-bold ${c.accuracy_score >= 80 ? 'text-emerald-600' : 'text-amber-600'}">${c.accuracy_score}%</td>
                                            <td class="px-6 py-4">
                                                <span class="px-2.5 py-1 rounded-full text-xs font-semibold ${
                                                    c.status === 'COMPLETED' ? 'bg-emerald-100 text-emerald-700' :
                                                    c.status === 'TIMED_OUT' ? 'bg-amber-100 text-amber-700' : 'bg-blue-100 text-blue-700'
                                                }">${c.status}</span>
                                            </td>
                                            <td class="px-6 py-4 text-center">
                                                <button data-id="${c.id}" class="btn-detail bg-blue-50 hover:bg-blue-100 text-blue-600 font-semibold px-3 py-1.5 rounded text-xs transition">
                                                    Detail Jawaban
                                                </button>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </main>
                <div id="modal-container"></div>
            `;

            container.querySelector('#btn-back-reg').addEventListener('click', () => {
                appState.step = 'REGISTER';
                render();
            });

            container.querySelector('#btn-refresh-dash').addEventListener('click', fetchDashboardData);

            container.querySelectorAll('.btn-detail').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const candidateId = e.target.getAttribute('data-id');
                    appState.selectedDetailCandidate = appState.candidatesList.find(item => item.id === candidateId);

                    const { data } = await supabaseClient
                        .from('clerical_submissions')
                        .select('*, clerical_questions(*)')
                        .eq('candidate_id', candidateId);

                    appState.detailSubmissions = data || [];
                    renderDetailModal();
                });
            });

            return container;
        }

        function renderDetailModal() {
            const existingModal = document.getElementById('detail-modal');
            if (existingModal) existingModal.remove();

            const modal = document.createElement('div');
            modal.id = 'detail-modal';
            modal.className = "fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4";
            
            modal.innerHTML = `
                <div class="bg-white rounded-2xl shadow-xl w-full max-w-4xl max-h-[85vh] flex flex-col overflow-hidden border border-slate-200">
                    <div class="px-6 py-4 bg-slate-900 text-white flex justify-between items-center">
                        <div>
                            <h3 class="font-bold text-lg">Detail Jawaban: ${appState.selectedDetailCandidate.full_name}</h3>
                            <p class="text-xs opacity-80">ID: ${appState.selectedDetailCandidate.participant_id} | Skor: ${appState.selectedDetailCandidate.accuracy_score}%</p>
                        </div>
                        <button id="close-modal" class="text-white hover:text-slate-300 font-bold text-xl">&times;</button>
                    </div>
                    
                    <div class="p-6 overflow-y-auto flex-1">
                        <table class="w-full text-left border-collapse text-sm">
                            <thead>
                                <tr class="bg-slate-100 border-b border-slate-200 text-xs font-semibold text-slate-600 uppercase">
                                    <th class="p-3">Kategori</th>
                                    <th class="p-3">Kolom 1</th>
                                    <th class="p-3">Kolom 2</th>
                                    <th class="p-3">Pilihan Kandidat</th>
                                    <th class="p-3 text-center">Status</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100 font-mono text-xs">
                                ${appState.detailSubmissions.map(sub => `
                                    <tr class="${sub.is_correct ? 'bg-emerald-50/50' : 'bg-red-50/50'}">
                                        <td class="p-3 font-sans font-medium text-slate-700">${sub.clerical_questions?.category || '-'}</td>
                                        <td class="p-3 text-slate-800">${sub.clerical_questions?.reference_text || '-'}</td>
                                        <td class="p-3 text-slate-800">${sub.clerical_questions?.expected_input_text || '-'}</td>
                                        <td class="p-3 font-bold">${sub.submitted_value || '-'}</td>
                                        <td class="p-3 text-center">
                                            <span class="px-2 py-0.5 rounded text-[10px] font-sans font-bold ${sub.is_correct ? 'bg-emerald-200 text-emerald-800' : 'bg-red-200 text-red-800'}">
                                                ${sub.is_correct ? 'BENAR' : 'SALAH'}
                                            </span>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>

                    <div class="px-6 py-4 bg-slate-50 border-t border-slate-200 text-right">
                        <button id="btn-close-modal-bottom" class="bg-slate-800 hover:bg-slate-900 text-white font-medium px-5 py-2 rounded-lg text-sm transition">Tutup</button>
                    </div>
                </div>
            `;

            document.body.appendChild(modal);

            modal.querySelector('#close-modal').addEventListener('click', () => modal.remove());
            modal.querySelector('#btn-close-modal-bottom').addEventListener('click', () => modal.remove());
        }

        window.addEventListener('DOMContentLoaded', render);
    </script>
</body>
</html>
